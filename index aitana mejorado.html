<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taller Mecánico</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#111827;
}

/* BOTÓN FLOTANTE */

#abrir-chat{
    position:fixed;
    right:20px;
    bottom:20px;
    background:linear-gradient(135deg,#ff9800,#ff6d00);
    color:white;
    border:none;
    border-radius:50px;
    padding:14px 22px;
    font-size:16px;
    cursor:pointer;
    box-shadow:0 10px 25px rgba(255,152,0,.35);
    z-index:9999;
}

/* CHAT */

#chatbot-container{
    position:fixed;
    right:20px;
    bottom:90px;
    width:360px;
    background:#1f2937;
    border-radius:18px;
    overflow:hidden;
    display:none;
    box-shadow:0 15px 40px rgba(0,0,0,.4);
}

/* HEADER */

.chat-header{
    background:linear-gradient(135deg,#ff9800,#ff6d00);
    color:white;
    padding:15px;
    font-weight:bold;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

#cerrar-chat{
    cursor:pointer;
}

/* MENSAJES */

#chat{
    height:350px;
    overflow-y:auto;
    padding:15px;
    color:white;
}

.mensaje{
    margin-bottom:12px;
    background:#374151;
    padding:12px;
    border-radius:12px;
}

/* INPUT */

.chat-input{
    display:flex;
    border-top:1px solid rgba(255,255,255,.08);
}

.chat-input input{
    flex:1;
    border:none;
    padding:14px;
    outline:none;
    background:#111827;
    color:white;
}

.chat-input button{
    border:none;
    background:#ff9800;
    color:white;
    padding:0 18px;
    cursor:pointer;
}

</style>
</head>
<body>

<button id="abrir-chat">🔧 TallerBot</button>

<div id="chatbot-container">

    <div class="chat-header">
        TallerBot
        <span id="cerrar-chat">✖</span>
    </div>

    <div id="chat"></div>

    <div class="chat-input">
        <input
            type="text"
            id="mensajeInput"
            placeholder="Escribe tu consulta..."
        >
        <button id="enviarBtn">Enviar</button>
    </div>

</div>

<script>

const chat = document.getElementById("chat");
const input = document.getElementById("mensajeInput");
const btn = document.getElementById("enviarBtn");

let respuestasBot = [];

/* ABRIR */

document
.getElementById("abrir-chat")
.addEventListener("click",()=>{

    document
    .getElementById("chatbot-container")
    .style.display="block";

});

/* CERRAR */

document
.getElementById("cerrar-chat")
.addEventListener("click",()=>{

    document
    .getElementById("chatbot-container")
    .style.display="none";

});

/* CARGAR JSON */

fetch("respuestas.json")
.then(response=>response.json())
.then(data=>{

    respuestasBot=data.respuestas;

    agregarMensaje(
        "TallerBot",
        "¡Hola! Bienvenido al taller 🚗 ¿En qué puedo ayudarte?"
    );

});

/* PINTAR MENSAJE */

function agregarMensaje(usuario,texto){

    chat.innerHTML += `
        <div class="mensaje">
            <strong>${usuario}:</strong> ${texto}
        </div>
    `;

    chat.scrollTop = chat.scrollHeight;

}

/* BUSCAR RESPUESTA */

function buscarRespuesta(texto){

    texto=texto.toLowerCase();

    for(let item of respuestasBot){

        for(let palabra of item.keywords){

            if(texto.includes(palabra.toLowerCase())){

                return item.respuesta;

            }

        }

    }

    return "No he entendido tu mensaje. Puedes escribir aceite, frenos, cita o presupuesto.";

}

/* ENVIAR */

function enviarMensaje(){

    const texto=input.value.trim();

    if(texto==="") return;

    agregarMensaje("Tú",texto);

    const respuesta=buscarRespuesta(texto);

    setTimeout(()=>{

        agregarMensaje(
            "TallerBot",
            respuesta
        );

    },500);

    input.value="";

}

/* BOTÓN */

btn.addEventListener(
    "click",
    enviarMensaje
);

/* ENTER */

input.addEventListener(
    "keydown",
    function(e){

        if(e.key==="Enter"){

            enviarMensaje();

        }

    }
);

</script>

</body>
</html>
