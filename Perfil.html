<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil | Taller Premium</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* CSS Exclusivo de tu sección de Perfil */
        body { background-color: #050505; color: white; font-family: sans-serif; }
        .perfil-wrapper { max-width: 900px; margin: 50px auto; padding: 20px; }
        .perfil-card { background: #111; border: 1px solid #333; border-radius: 15px; padding: 40px; margin-bottom: 30px; display: flex; align-items: center; gap: 30px; }
        .perfil-foto { width: 120px; height: 120px; border-radius: 50%; border: 3px solid #ff5722; object-fit: cover; }
        
        .tabs { display: flex; gap: 20px; border-bottom: 2px solid #333; margin-bottom: 30px; }
        .tab-btn { background: none; border: none; color: #888; padding: 15px 20px; cursor: pointer; font-size: 1.1rem; transition: 0.3s; }
        .tab-btn.active { color: #ff5722; border-bottom: 3px solid #ff5722; font-weight: bold; }
        
        .tab-content { display: none; background: #111; padding: 40px; border-radius: 15px; border: 1px solid #333; }
        .tab-content.active { display: block; }
        
        .dato-item { margin-bottom: 25px; }
        .dato-item label { color: #888; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
        .dato-item p { font-size: 1.3rem; font-weight: bold; margin-top: 5px; }
        
        .btn-logout { background: #e91e63; color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; font-size: 1.1rem; margin-top: 20px; }
    </style>
</head>
<body>

<div class="perfil-wrapper">
    <div class="perfil-card">
        <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=200" class="perfil-foto" alt="Foto Perfil">
        <div>
            <h1 id="nombreUsuario" style="margin: 0; font-size: 2.5rem;">Cargando Datos...</h1>
            <p id="emailUsuario" style="color: #888; font-size: 1.1rem; margin-top: 5px;">---</p>
            <span style="display: inline-block; margin-top: 10px; background: rgba(255,87,34,0.2); color: #ff5722; padding: 5px 15px; border-radius: 20px; font-size: 0.85rem; font-weight: bold;">CLIENTE VIP</span>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-tab="tab-datos">📋 Mi Vehículo</button>
        <button class="tab-btn" data-tab="tab-historial">🛠️ Historial</button>
        <button class="tab-btn" data-tab="tab-ajustes">⚙️ Ajustes</button>
    </div>

    <div id="tab-datos" class="tab-content active">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px;">
            <div class="dato-item">
                <label>Nombre Completo</label>
                <p id="infoNombre">---</p>
            </div>
            <div class="dato-item">
                <label>Teléfono</label>
                <p id="infoTelefono">No registrado</p>
            </div>
            <div class="dato-item">
                <label>Modelo del Vehículo</label>
                <p id="infoCoche" style="color: #ff5722;">---</p>
            </div>
            <div class="dato-item">
                <label>Matrícula</label>
                <p id="infoMatricula">---</p>
            </div>
        </div>
    </div>

    <div id="tab-historial" class="tab-content">
        <div style="text-align: center; color: #888; padding: 30px;">
            <i class="fas fa-clipboard-list" style="font-size: 40px; margin-bottom: 15px;"></i>
            <p>No hay facturas ni reparaciones previas en el sistema.</p>
        </div>
    </div>

    <div id="tab-ajustes" class="tab-content">
        <div style="display: flex; justify-content: space-between; padding-bottom: 20px; border-bottom: 1px solid #333; margin-bottom: 20px;">
            <span>Recibir alertas de revisión Pre-ITV</span>
            <input type="checkbox" checked style="accent-color: #ff5722; transform: scale(1.5);">
        </div>
        <button id="btnCerrarSesion" class="btn-logout">Cerrar Sesión Segura</button>
    </div>
</div>

<script type="module">
    // Lógica de pestañas
    const botones = document.querySelectorAll('.tab-btn');
    const contenidos = document.querySelectorAll('.tab-content');

    botones.forEach(btn => {
        btn.addEventListener('click', () => {
            botones.forEach(b => b.classList.remove('active'));
            contenidos.forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(btn.getAttribute('data-tab')).classList.add('active');
        });
    });

    // ==========================================
    // CÓDIGO FIREBASE PARA QUE CARLOS LO CONECTE
    // ==========================================
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    
    const firebaseConfig = {
        apiKey: "TU_API_KEY",
        authDomain: "TU_AUTH_DOMAIN",
        projectId: "TU_PROJECT_ID",
        storageBucket: "TU_STORAGE_BUCKET",
        messagingSenderId: "TU_SENDER_ID",
        appId: "TU_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Vigilamos si el usuario ha entrado
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            // Buscamos sus datos en Firestore
            const docRef = doc(db, "usuarios", user.uid);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                const data = docSnap.data();
                document.getElementById('nombreUsuario').textContent = data.nombre || 'Usuario';
                document.getElementById('emailUsuario').textContent = user.email;
                document.getElementById('infoNombre').textContent = data.nombre || '---';
                document.getElementById('infoTelefono').textContent = data.telefono || '---';
                document.getElementById('infoCoche').textContent = data.vehiculo || '---';
                document.getElementById('infoMatricula').textContent = data.matricula || '---';
            }
        } else {
           
        }
    });

    // Cerrar sesión
    document.getElementById('btnCerrarSesion').addEventListener('click', () => {
        signOut(auth).then(() => {
            window.location.href = "index.html";
        });
    });
</script>
</body>
</html>
